<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Black Sea Map (Leaflet)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.pattern@0.1.0/dist/leaflet.pattern-src.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: 300px;
    }

    .top-right {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-right button {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      background: #17384f;
      color: white;
      font-weight: 600;
    }

    .panel h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 6px 0;
    }

    label {
      font-size: 12px;
      min-width: 70px;
    }

    select {
      width: 100%;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0 4px 0;
      font-size: 12px;
    }

    .checkbox-row input {
      margin: 0;
    }

    .checkbox-row input[type="checkbox"] {
      accent-color: #28a745;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      width: 255px;
    }

    .legend-title {
      font-size: 13px;
      margin: 0 0 8px 0;
      font-weight: 600;
      line-height: 1.3;
    }

    .legend-buoy {
      display: inline-block;
      object-fit: contain;
    }

    /* Coastal = tall */
    .legend-buoy.coastal {
      height: 40px;
      width: auto;
    }

    /* Offshore = compact */
    .legend-buoy.offshore {
      height: 28px;
      width: auto;
    }

    .bar {
      height: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
    }

    .legend-divider {
      height: 1px;
      background: #ddd;
      margin: 10px 0 8px 0;
    }

    .legend-line-item,
    .legend-fill-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #333;
      margin-top: 6px;
    }

    .legend-line-symbol {
      display: inline-block;
      width: 24px;
      height: 0;
      border-top: 2px solid #7f7f7f;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .legend-hatch-symbol {
      display: inline-block;
      width: 24px;
      height: 14px;
      border: 1px solid #28a745;
      background:
        repeating-linear-gradient(
          -45deg,
          rgba(40,167,69,0.75) 0px,
          rgba(40,167,69,0.75) 2px,
          transparent 2px,
          transparent 6px
        );
      flex-shrink: 0;
    }

    .hint {
      font-size: 12px;
      color: #444;
      margin-top: 8px;
      line-height: 1.25;
    }

    .hidden {
      display: none;
    }

    .temp-bar {
      background: linear-gradient(90deg,
        #2c7bb6, #00a6ca, #00ccbc, #90eb9d, #ffff8c, #f9d057, #f29e2e, #e76818, #d7191c
      );
    }

    .salinity-bar {
      background: linear-gradient(90deg,
        #313695, #4575b4, #74add1, #abd9e9, #e0f3f8, #fee090, #fdae61, #f46d43, #d73027
      );
    }

    .oxygen-bar {
      background: linear-gradient(90deg,
        #d73027,
        #f46d43,
        #fdae61,
        #fee08b,
        #d9ef8b,
        #91cf60,
        #4575b4,
        #313695
      );
    }

    /* .current-bar {
      background: linear-gradient(90deg,
        #f7fbff, #deebf7, #c6dbef, #9ecae1,
        #6baed6, #4292c6, #2171b5, #08519c, #08306b
      );
    } */

    .current-bar {
      background: linear-gradient(90deg,
        #2c7bb6,
        #5aa7d8,
        #91d3c2,
        #d9ef8b,
        #fee08b,
        #fdae61,
        #f46d43,
        #d73027
      );
    }

    .bathy-bar {
      background: linear-gradient(90deg,
        #081d58, #253494, #225ea8, #1d91c0, #41b6c4, #7fcdbb, #c7e9b4, #edf8b1
      );
    }

    .isobath-text {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .isobath-text div {
      transform: translate(-50%, -50%);
      /* font-size: 10px; */
      font-size: 12px;
      /* font-weight: 400; */
      font-weight: 600;
      color: rgba(29, 28, 28, 0.7);
      background: transparent;
      padding: 0;
      text-shadow: 0 0 2px rgba(255,255,255,0.8);
      line-height: 1;
      white-space: nowrap;
      display: inline-block;
    }



    .sound-toggle {
  position: absolute;
  bottom: 28px;
  right: 12px;
  z-index: 1000;

  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: none;

  background: rgba(255,255,255,0.95);
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);

  font-size: 20px;
  cursor: pointer;

  display: flex;
  justify-content: center;
  align-items: center;
}



/* ---------- Base desktop sizes ---------- */
.panel {
  width: 300px;
  max-width: none;
}

.legend {
  width: 255px;
  max-width: none;
}

.top-right {
  max-width: none;
}

#userEmail {
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Keep Leaflet credits neat */
.leaflet-control-attribution {
  font-size: 11px;
  /* max-width: 46vw;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis; */
}

/* ---------- Mobile: keep same layout, scale everything down ---------- */
@media (max-width: 640px) {
  .panel,
  .legend,
  .top-right,
  .sound-toggle,
  .leaflet-control-attribution,
  .leaflet-control-scale {
    transform-origin: top left;
  }

  .panel {
    top: 10px;
    left: 10px;
    width: 300px;
    transform: scale(0.72);
  }

  .top-right {
    top: 10px;
    right: 10px;
    left: auto;
    width: auto;
    transform-origin: top right;
    transform: scale(0.72);
  }

  .legend {
    left: 10px;
    bottom: 10px;
    width: 255px;
    transform-origin: bottom left;
    transform: scale(0.72);
  }

  .sound-toggle {
    right: 10px;
    bottom: 10px;
    transform-origin: bottom right;
    transform: scale(0.82);
  }

  .leaflet-control-attribution {
    transform-origin: bottom right;
    transform: scale(0.78);
    margin: 0 6px 6px 0 !important;
    max-width: 42vw;
  }

  .leaflet-control-scale {
    transform-origin: bottom left;
    transform: scale(0.78);
    margin: 0 0 6px 6px !important;
  }

  .legend-buoy.coastal {
    height: 34px;
  }

  .legend-buoy.offshore {
    height: 24px;
  }

  .isobath-text div {
    font-size: 10px;
  }
}

/* Smaller phones */
@media (max-width: 420px) {
  .panel {
    transform: scale(0.64);
  }

  .top-right {
    transform: scale(0.64);
  }

  .legend {
    transform: scale(0.64);
  }

  .sound-toggle {
    transform: scale(0.76);
  }

  .leaflet-control-attribution,
  .leaflet-control-scale {
    transform: scale(0.72);
  }
}

.leaflet-control-attribution {
  font-size: 11px;
}

@media (max-width: 640px) {
  .leaflet-control-attribution {
    transform-origin: bottom right;
    transform: scale(0.78);
    margin: 0 6px 6px 0 !important;

    max-width: none;          /* remove trimming */
    white-space: normal;      /* allow wrapping */
    overflow: visible;        /* allow full text */
    text-overflow: clip;      /* no dots */
    line-height: 1.2;
  }

  .leaflet-bottom.leaflet-right {
    right: 6px;
    bottom: 4px;
    max-width: 46vw;
  }
}

  </style>
</head>

<body>
  <div id="map"></div>

  <div class="top-right">
    <span id="userEmail">Loading...</span>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="panel">
    <h3>Map layers</h3>

    <div class="row">
      <label for="layerType">Layer</label>
      <select id="layerType">
        <option value="temperature" selected>Temperature</option>
        <option value="salinity">Salinity</option>
        <option value="dissolved_oxygen">Dissolved oxygen</option>
        <option value="current">Current</option>
        <option value="bathymetry">Bathymetry</option>
      </select>
    </div>

    <div class="row" id="depthRow">
      <label for="depth">Depth</label>
      <select id="depth">
        <option value="surface" selected>Surface</option>
        <option value="bottom">Bottom</option>
      </select>
    </div>

    <div class="row" id="monthRow">
      <label for="month">Month</label>
      <select id="month">
        <option value="february" selected>February 2025</option>
        <option value="march">March 2025</option>
        <option value="april">April 2025</option>
        <option value="september">September 2025</option>
        <option value="october">October 2025</option>
        <option value="november">November 2025</option>
      </select>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="habitatToggle">
      <label for="habitatToggle" style="min-width:auto;">Sturgeon habitat</label>
    </div>

    <div class="hint" id="panelHint">Select depth and month.</div>
  </div>

  <div class="legend" id="legend">
    <div class="legend-title" id="legendTitle">Surface temperature (°C) - February 2025</div>

    <div class="bar temp-bar" id="legendBar"></div>

    <div class="legend-labels">
      <span id="minV">4.15</span>
      <span id="maxV">9.08</span>
    </div>

    <div class="legend-divider"></div>

    <div class="legend-line-item">
      <img src="buoy_coastal.png" class="legend-buoy coastal">
      <span>Coastal buoy</span>
    </div>

    <div class="legend-line-item">
      <img src="buoy_offshore.png" class="legend-buoy offshore">
      <span>Offshore buoy</span>
    </div>

    <div class="legend-line-item">
      <span class="legend-line-symbol"></span>
      <span>Isobaths</span>
    </div>

    <div class="legend-fill-item">
      <span class="legend-hatch-symbol"></span>
      <span>Sturgeon habitat area</span>
    </div>
  </div>

  <button id="soundToggle" class="sound-toggle">🔇</button>
  <audio id="seaSound" loop>
    <source src="freesound_community-seagulls-by-the-sea-7042_new.mp3" type="audio/mpeg">
  </audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAGXHel-iEqb6fAAZHRs-pnVfICMWC0jUc",
      authDomain: "cpanal-80398.firebaseapp.com",
      projectId: "cpanal-80398",
      storageBucket: "cpanal-80398.firebasestorage.app",
      messagingSenderId: "65568484551",
      appId: "1:65568484551:web:3f7fe4bb8161e705e462e2",
      measurementId: "G-815TC6N1Q7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      document.getElementById("userEmail").textContent = user.email || "Signed in";
      initMap();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    function initMap() {
      const map = L.map("map").setView([44.2, 29.4], 8);

      function getBuoySize() {
        const z = map.getZoom();

        if (z <= 7) return 25;
        if (z <= 9) return 35;
        return 50;
      }

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      map.attributionControl.setPrefix('<a href="https://leafletjs.com" title="A JavaScript library for interactive maps">Leaflet</a>');

      map.attributionControl.addAttribution(
        'Sound: <a href="https://pixabay.com/users/freesound_community-46691455/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=7042" target="_blank" rel="noopener noreferrer">freesound_community</a> / <a href="https://pixabay.com/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=7042" target="_blank" rel="noopener noreferrer">Pixabay</a>'
      );

      map.attributionControl.addAttribution(
        'Buoy data: <a href="https://www.euxinus.eu/emso_euxinus_network.html" target="_blank" rel="noopener noreferrer">EMSO Euxinus Network</a>'
      );

      L.control.scale({ metric: true, imperial: false }).addTo(map);

      const AOI_FILE = "area_of_interest.geojson";
      const IZOBATE_FILE = "izobate_AOI.geojson";
      const HABITAT_FILE = "sturgeon_habitat.geojson";

      const TILE_MIN_ZOOM = 6;
      const TILE_MAX_ZOOM = 12;
      const TILE_ROOT = "sturnet_database/tiles";

      const temperatureRanges = {
        surface: {
          february:  { min: 4.15,  max: 9.08 },
          march:     { min: 6.34,  max: 9.08 },
          april:     { min: 9.82,  max: 11.46 },
          september: { min: 22.20, max: 23.79 },
          october:   { min: 15.90, max: 18.68 },
          november:  { min: 13.76, max: 16.20 }
        },
        bottom: {
          february:  { min: 3.80,  max: 9.26 },
          march:     { min: 5.50,  max: 8.96 },
          april:     { min: 6.95,  max: 11.30 },
          september: { min: 8.81,  max: 23.86 },
          october:   { min: 8.74,  max: 18.56 },
          november:  { min: 8.58,  max: 15.31 }
        }
      };

      const salinityRanges = {
        surface: {
          february:  { min: 7.23, max: 18.40 },
          march:     { min: 6.64, max: 18.45 },
          april:     { min: 4.71, max: 18.67 },
          september: { min: 7.59, max: 18.90 },
          october:   { min: 8.12, max: 18.62 },
          november:  { min: 8.11, max: 18.74 }
        },
        bottom: {
          february:  { min: 7.23, max: 18.40 },
          march:     { min: 6.64, max: 18.45 },
          april:     { min: 4.71, max: 18.67 },
          september: { min: 7.59, max: 18.90 },
          october:   { min: 8.12, max: 18.62 },
          november:  { min: 8.11, max: 18.74 }
        }
      };

      const dissolvedOxygenRanges = {
        february:  { min: 294.17, max: 393.17 },
        march:     { min: 303.49, max: 387.90 },
        april:     { min: 295.29, max: 478.93 },
        september: { min: 231.97, max: 355.16 },
        october:   { min: 252.73, max: 312.29 },
        november:  { min: 262.44, max: 320.22 }
      };

        const currentRanges = {
        february:  { min: 0.0010, max: 0.4100 },
        march:     { min: 0.0003, max: 0.2100 },
        april:     { min: 0.0010, max: 0.2000 },
        september: { min: 0.0020, max: 0.3480 },
        october:   { min: 0.0001, max: 0.2130 },
        november:  { min: 0.0008, max: 0.1840 }
      };

      const bathyRange = {
        min: -1347.78,
        max: 1.57
      };

      const monthLabels = {
        february: "February 2025",
        march: "March 2025",
        april: "April 2025",
        september: "September 2025",
        october: "October 2025",
        november: "November 2025"
      };

      const depthLabels = {
        surface: "Surface",
        bottom: "Bottom"
      };

      let currentRaster = null;
      let aoiLayer = null;
      let izobateLayer = null;
      let habitatLayer = null;
      let hatchPattern = null;
      let isobathLabelLayer = L.layerGroup().addTo(map);

      if (typeof L.StripePattern !== "undefined") {
        hatchPattern = new L.StripePattern({
          weight: 2,
          spaceWeight: 4,
          color: "#28a745",
          spaceColor: "transparent",
          opacity: 0.75,
          angle: 45
        });
        hatchPattern.addTo(map);
      }

      function updateLegendForTemperature(depth, month) {
        const range = temperatureRanges[depth][month];
        document.getElementById("legendTitle").textContent =
          `${depthLabels[depth]} temperature (°C) - ${monthLabels[month]}`;
        document.getElementById("minV").textContent = range.min.toFixed(2);
        document.getElementById("maxV").textContent = range.max.toFixed(2);

        const legendBar = document.getElementById("legendBar");
        legendBar.classList.remove("salinity-bar", "oxygen-bar", "bathy-bar");
        legendBar.classList.add("temp-bar");
      }

      function updateLegendForSalinity(depth, month) {
        const range = salinityRanges[depth][month];
        document.getElementById("legendTitle").textContent =
          `${depthLabels[depth]} salinity (‰) - ${monthLabels[month]}`;
        document.getElementById("minV").textContent = range.min.toFixed(2);
        document.getElementById("maxV").textContent = range.max.toFixed(2);

        const legendBar = document.getElementById("legendBar");
        legendBar.classList.remove("temp-bar", "oxygen-bar", "bathy-bar");
        legendBar.classList.add("salinity-bar");
      }

      function updateLegendForDissolvedOxygen(month) {
        const range = dissolvedOxygenRanges[month];
        document.getElementById("legendTitle").textContent =
          `Dissolved oxygen (mmol/m3) - ${monthLabels[month]}`;
        document.getElementById("minV").textContent = range.min.toFixed(2);
        document.getElementById("maxV").textContent = range.max.toFixed(2);

        const legendBar = document.getElementById("legendBar");
        legendBar.classList.remove("temp-bar", "salinity-bar", "bathy-bar");
        legendBar.classList.add("oxygen-bar");
      }

      function updateLegendForCurrent(month) {
        const range = currentRanges[month];
        document.getElementById("legendTitle").textContent =
          `Current velocity (m/s) - ${monthLabels[month]}`;
        document.getElementById("minV").textContent = range.min.toFixed(4);
        document.getElementById("maxV").textContent = range.max.toFixed(3);

        const legendBar = document.getElementById("legendBar");
        legendBar.classList.remove("temp-bar", "salinity-bar", "oxygen-bar", "bathy-bar");
        legendBar.classList.add("current-bar");
      }

      function updateLegendForBathymetry() {
        document.getElementById("legendTitle").textContent = "Bathymetry (m)";
        document.getElementById("minV").textContent = bathyRange.min.toFixed(2);
        document.getElementById("maxV").textContent = bathyRange.max.toFixed(2);

        const legendBar = document.getElementById("legendBar");
        legendBar.classList.remove("temp-bar", "salinity-bar", "oxygen-bar");
        legendBar.classList.add("bathy-bar");
      }

      function makeTemperatureLayer(depth, month) {
        return L.tileLayer(`${TILE_ROOT}/${depth}/${month}/{z}/{x}/{y}.png`, {
          minZoom: TILE_MIN_ZOOM,
          maxZoom: TILE_MAX_ZOOM,
          tms: false,
          opacity: 0.85
        });
      }

      function makeSalinityLayer(depth, month) {
        return L.tileLayer(`${TILE_ROOT}/salinity/${depth}/${month}/{z}/{x}/{y}.png`, {
          minZoom: TILE_MIN_ZOOM,
          maxZoom: TILE_MAX_ZOOM,
          tms: false,
          opacity: 0.85
        });
      }

      function makeDissolvedOxygenLayer(month) {
        return L.tileLayer(`${TILE_ROOT}/dissolved_oxygen/${month}/{z}/{x}/{y}.png`, {
          minZoom: TILE_MIN_ZOOM,
          maxZoom: TILE_MAX_ZOOM,
          tms: false,
          opacity: 0.85
        });
      }

      function makeCurrentLayer(month) {
        return L.tileLayer(`${TILE_ROOT}/current/${month}/{z}/{x}/{y}.png`, {
          minZoom: TILE_MIN_ZOOM,
          maxZoom: TILE_MAX_ZOOM,
          tms: false,
          opacity: 0.85
        });
      }

      function makeBathymetryLayer() {
        return L.tileLayer(`${TILE_ROOT}/bathymetry/{z}/{x}/{y}.png`, {
          minZoom: TILE_MIN_ZOOM,
          maxZoom: TILE_MAX_ZOOM,
          tms: false,
          opacity: 0.85
        });
      }

      function updateMonthOptionsForLayer(layerType) {
  const monthSelect = document.getElementById("month");
  const currentValue = monthSelect.value;

  const allowedMonths = ["february", "march", "april", "september", "october", "november"];

  if (layerType === "bathymetry") {
    return;
  }

  Array.from(monthSelect.options).forEach(option => {
    option.hidden = !allowedMonths.includes(option.value);
  });

  if (!allowedMonths.includes(currentValue)) {
    monthSelect.value = allowedMonths[0];
  }
}


function updatePanelVisibility() {
  const layerType = document.getElementById("layerType").value;
  const depthRow = document.getElementById("depthRow");
  const monthRow = document.getElementById("monthRow");
  const panelHint = document.getElementById("panelHint");

  if (layerType === "bathymetry") {
    depthRow.style.display = "none";
    monthRow.style.display = "none";
    panelHint.textContent = "Bathymetry layer is displayed.";
  } else if (layerType === "dissolved_oxygen") {
    depthRow.style.display = "none";
    monthRow.style.display = "flex";
    panelHint.textContent = "Select month for dissolved oxygen.";
  } else if (layerType === "current") {
    depthRow.style.display = "none";
    monthRow.style.display = "flex";
    panelHint.textContent = "Select month for current velocity.";
  } else {
    depthRow.style.display = "flex";
    monthRow.style.display = "flex";
    panelHint.textContent = "Select depth and month.";
  }
}


      function keepOverlaysOnTop() {
        if (izobateLayer) izobateLayer.bringToFront();
        if (isobathLabelLayer) isobathLabelLayer.eachLayer(layer => layer.bringToFront());
        if (habitatLayer && map.hasLayer(habitatLayer)) habitatLayer.bringToFront();
      }

      function getMidpointFromCoords(coords) {
        if (!coords || !coords.length) return null;
        const midIndex = Math.floor(coords.length / 2);
        const mid = coords[midIndex];
        if (!mid || mid.length < 2) return null;
        return [mid[1], mid[0]];
      }

      function getLabelPointFromGeometry(geometry) {
        if (!geometry) return null;

        if (geometry.type === "LineString") {
          return getMidpointFromCoords(geometry.coordinates);
        }

        if (geometry.type === "MultiLineString") {
          let longest = null;
          let longestLen = 0;
          geometry.coordinates.forEach(line => {
            if (line && line.length > longestLen) {
              longest = line;
              longestLen = line.length;
            }
          });
          return longest ? getMidpointFromCoords(longest) : null;
        }

        return null;
      }

      function addIsobathLabel(feature, value) {
        const labelPoint = getLabelPointFromGeometry(feature.geometry);
        if (!labelPoint) return;

        const labelMarker = L.marker(labelPoint, {
          interactive: false,
          icon: L.divIcon({
            className: "isobath-text",
            html: `<div>${value} m</div>`,
            iconSize: null
          })
        });

        isobathLabelLayer.addLayer(labelMarker);
      }

 


function refreshRaster() {
  const layerType = document.getElementById("layerType").value;

  updatePanelVisibility();

  if (currentRaster) {
    map.removeLayer(currentRaster);
  }

  if (layerType === "bathymetry") {
    currentRaster = makeBathymetryLayer();
    updateLegendForBathymetry();
  } else if (layerType === "dissolved_oxygen") {
    updateMonthOptionsForLayer(layerType);
    const finalMonth = document.getElementById("month").value;
    currentRaster = makeDissolvedOxygenLayer(finalMonth);
    updateLegendForDissolvedOxygen(finalMonth);
  } else if (layerType === "current") {
    updateMonthOptionsForLayer(layerType);
    const finalMonth = document.getElementById("month").value;
    currentRaster = makeCurrentLayer(finalMonth);
    updateLegendForCurrent(finalMonth);
  } else if (layerType === "salinity") {
    updateMonthOptionsForLayer(layerType);
    const depth = document.getElementById("depth").value;
    const finalMonth = document.getElementById("month").value;
    currentRaster = makeSalinityLayer(depth, finalMonth);
    updateLegendForSalinity(depth, finalMonth);
  } else {
    updateMonthOptionsForLayer(layerType);
    const depth = document.getElementById("depth").value;
    const finalMonth = document.getElementById("month").value;
    currentRaster = makeTemperatureLayer(depth, finalMonth);
    updateLegendForTemperature(depth, finalMonth);
  }

  currentRaster.addTo(map);
  keepOverlaysOnTop();
}


      fetch(AOI_FILE)
        .then(r => {
          if (!r.ok) throw new Error(`AOI fetch failed: ${r.status}`);
          return r.json();
        })
        .then(gj => {
          aoiLayer = L.geoJSON(gj, {
            style: {
              color: "#111",
              weight: 2,
              fillColor: "#000",
              fillOpacity: 0.03
            }
          }).addTo(map);

          map.fitBounds(aoiLayer.getBounds(), { padding: [20, 20] });
        })
        .catch(err => console.log("AOI not loaded:", err));

      fetch(IZOBATE_FILE)
        .then(r => {
          if (!r.ok) throw new Error(`Izobaths fetch failed: ${r.status}`);
          return r.json();
        })
        .then(gj => {
          isobathLabelLayer.clearLayers();

          izobateLayer = L.geoJSON(gj, {
            style: function() {
              return {
                color: "#7f7f7f",
                weight: 1.5,
                opacity: 0.9
              };
            },
            onEachFeature: function(feature, layer) {
              const props = feature.properties || {};
              const val = props.value ?? props.VALUE ?? props.depth ?? props.DEPTH ?? props.Depth ?? null;

              if (val !== null) {
                layer.bindPopup(`Isobath: ${val} m`);
                addIsobathLabel(feature, val);
              }
            }
          }).addTo(map);

          keepOverlaysOnTop();
        })
        .catch(err => console.log("Izobaths not loaded:", err));

      fetch(HABITAT_FILE)
        .then(r => {
          if (!r.ok) throw new Error(`Habitat fetch failed: ${r.status}`);
          return r.json();
        })
        .then(gj => {
          habitatLayer = L.geoJSON(gj, {
            style: function() {
              if (hatchPattern) {
                return {
                  color: "#28a745",
                  weight: 1,
                  fillPattern: hatchPattern,
                  fillOpacity: 1
                };
              }
              return {
                color: "#28a745",
                weight: 1,
                fillColor: "#b9e7c3",
                fillOpacity: 0.35
              };
            }
          });
        })
        .catch(err => console.log("Habitat not loaded:", err));



      const offshoreBuoyIcon = L.icon({
        iconUrl: "buoy_offshore.png",
        iconSize: [40, 40],
        iconAnchor: [20, 20],
        popupAnchor: [0, -16]
      });

      const coastalBuoyIcon = L.icon({
        iconUrl: "buoy_coastal.png",
        iconSize: [40, 70],
        iconAnchor: [20, 65],
        popupAnchor: [0, -36]
      });

      fetch("buoys.geojson")
        .then(res => {
          if (!res.ok) throw new Error(`Buoys fetch failed: ${res.status}`);
          return res.json();
        })
        .then(data => {
          buoyLayer = L.geoJSON(data, {
            pointToLayer: function (feature, latlng) {
              const type = (feature.properties?.type || "").toLowerCase();

              const icon = type === "coastal"
                ? coastalBuoyIcon
                : offshoreBuoyIcon;

              return L.marker(latlng, { icon });
            },
            onEachFeature: function (feature, layer) {
              const props = feature.properties || {};
              const name = props.name || "Buoy";
              const type = props.type || "unknown";
              layer.bindPopup(`<b>${name}</b><br>Type: ${type}`);
            }
          }).addTo(map);

          keepOverlaysOnTop();
        })
        .catch(err => console.log("Buoys not loaded:", err));


      document.getElementById("habitatToggle").addEventListener("change", function() {
        if (!habitatLayer) return;

        if (this.checked) {
          habitatLayer.addTo(map);
          keepOverlaysOnTop();
        } else {
          map.removeLayer(habitatLayer);
        }
      });


      
document.getElementById("layerType").addEventListener("change", function () {
  updatePanelVisibility();
  refreshRaster();
});


      document.getElementById("depth").addEventListener("change", refreshRaster);
      document.getElementById("month").addEventListener("change", refreshRaster);

      updatePanelVisibility();
      refreshRaster();
    }
  </script>


<script>
    const seaSound = document.getElementById("seaSound");
const soundToggle = document.getElementById("soundToggle");

let soundEnabled = localStorage.getItem("seaSoundEnabled") === "true";

function updateSoundIcon() {
  soundToggle.textContent = soundEnabled ? "🔊" : "🔇";
}

async function turnSoundOn() {
  try {
    seaSound.volume = 0.80;
    await seaSound.play();
    soundEnabled = true;
    localStorage.setItem("seaSoundEnabled", "true");
    updateSoundIcon();
  } catch (e) {
    console.log("Sound blocked by browser.");
  }
}

function turnSoundOff() {
  seaSound.pause();
  seaSound.currentTime = 0;
  soundEnabled = false;
  localStorage.setItem("seaSoundEnabled", "false");
  updateSoundIcon();
}

soundToggle.addEventListener("click", async () => {
  if (soundEnabled) {
    turnSoundOff();
  } else {
    await turnSoundOn();
  }
});

updateSoundIcon();

// auto play if previously enabled
window.addEventListener("load", async () => {
  if (soundEnabled) {
    try {
      seaSound.volume = 0.35;
      await seaSound.play();
    } catch (e) {
      console.log("Autoplay blocked.");
    }
  }
});
</script>
