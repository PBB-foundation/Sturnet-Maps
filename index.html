<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Black Sea Map Login</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #071827;
    }

    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      background: #071827;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(rgba(7, 24, 39, 0.45), rgba(7, 24, 39, 0.58));
      pointer-events: none;
    }

    .ambient-glow {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(85, 180, 255, 0.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.10), transparent 22%),
        radial-gradient(circle at 60% 80%, rgba(0, 180, 160, 0.14), transparent 28%);
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: scale(1) translateY(0px); }
      to   { transform: scale(1.04) translateY(-8px); }
    }

    .sound-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 3;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.22);
      transition: transform 0.15s ease;
    }

    .sound-toggle:hover {
      transform: scale(1.04);
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: min(420px, 92vw);
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      color: #fff;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .brand p {
      margin: 0;
      font-size: 14px;
      color: rgba(255,255,255,0.86);
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.92);
    }

    .field input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.65);
    }

    .field input:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.16);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .primary-btn {
      background: #ffffff;
      color: #0d2a3f;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.16);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .switch-text {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
    }

    .message {
      min-height: 20px;
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      color: #ffe8e8;
    }

    .small-note {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
    }

    .credits {
      position: fixed;
      left: 12px;
      bottom: 10px;
      z-index: 2;
      font-size: 11px;
      line-height: 1.4;
      color: rgba(255,255,255,0.88);
      background: rgba(0,0,0,0.25);
      padding: 8px 10px;
      border-radius: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      max-width: min(92vw, 520px);
    }

    .credits a {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="160767-822213540.mp4" type="video/mp4">
  </video>

  <div class="video-overlay"></div>
  <div class="ambient-glow"></div>

  <button id="soundToggle" class="sound-toggle" title="Toggle sound">🔇</button>

  <div class="login-card">
    <div class="brand">
      <h1>Black Sea Map</h1>
      <p>Secure access to your marine layers</p>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" />
    </div>

    <div class="actions">
      <button id="loginBtn" class="primary-btn">Login</button>
      <button id="signupBtn" class="secondary-btn">Create account</button>
    </div>

    <div class="switch-text">
      After login, you will be redirected to the map.
    </div>

    <div class="message" id="message"></div>

    <div class="small-note">
      Protected with Firebase Authentication
    </div>
  </div>

  <div class="credits">
    Sound effect by
    <a href="https://pixabay.com/users/freesound_community-46691455/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=7042" target="_blank" rel="noopener noreferrer">freesound_community</a>
    from
    <a href="https://pixabay.com/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=7042" target="_blank" rel="noopener noreferrer">Pixabay</a>.
    Video by
    <a href="https://pixabay.com/users/crey_zz-35842619/?utm_source=link-attribution&utm_medium=referral&utm_campaign=video&utm_content=160767" target="_blank" rel="noopener noreferrer">Callan Reynolds</a>
    from
    <a href="https://pixabay.com/?utm_source=link-attribution&utm_medium=referral&utm_campaign=video&utm_content=160767" target="_blank" rel="noopener noreferrer">Pixabay</a>.
  </div>

  <audio id="seaSound" loop>
    <source src="freesound_community-seagulls-by-the-sea-7042_new.mp3" type="audio/mpeg">
  </audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9QAGa7hG8ZKuJvoAkwVA7v8TOFGmr6R4",
      authDomain: "sturnet-88b6c.firebaseapp.com",
      projectId: "sturnet-88b6c",
      storageBucket: "sturnet-88b6c.firebasestorage.app",
      messagingSenderId: "280561154718",
      appId: "1:280561154718:web:f05b1a04f19577281a598f",
      measurementId: "G-F8HEE8SYXB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const messageEl = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const soundToggle = document.getElementById("soundToggle");
    const seaSound = document.getElementById("seaSound");
    const bgVideo = document.getElementById("bgVideo");

    let soundEnabled = localStorage.getItem("seaSoundEnabled") === "true";
    let authChecked = false;
    let redirecting = false;

    function showMessage(text) {
      messageEl.textContent = text || "";
    }

    function setButtonsDisabled(disabled) {
      loginBtn.disabled = disabled;
      signupBtn.disabled = disabled;
    }

    function updateSoundIcon() {
      soundToggle.textContent = soundEnabled ? "🔊" : "🔇";
      soundToggle.title = soundEnabled ? "Sound on" : "Sound off";
    }

    async function turnSoundOn() {
      try {
        seaSound.volume = 0.80;
        await seaSound.play();
        soundEnabled = true;
        localStorage.setItem("seaSoundEnabled", "true");
        updateSoundIcon();
        showMessage("");
      } catch (error) {
        showMessage("Click the sound icon again to enable sound.");
      }
    }

    function turnSoundOff() {
      seaSound.pause();
      seaSound.currentTime = 0;
      soundEnabled = false;
      localStorage.setItem("seaSoundEnabled", "false");
      updateSoundIcon();
    }

    function goToMap() {
      if (redirecting) return;
      redirecting = true;
      window.location.replace("map.html");
    }

    function getFriendlyErrorMessage(error) {
      switch (error.code) {
        case "auth/invalid-email":
          return "Please enter a valid email address.";
        case "auth/missing-password":
          return "Please enter your password.";
        case "auth/weak-password":
          return "Password should be at least 6 characters.";
        case "auth/email-already-in-use":
          return "This email already has an account. Please log in instead.";
        case "auth/invalid-credential":
          return "Invalid email or password. If this is your first time, click Create account.";
        case "auth/user-not-found":
          return "No account found for this email. Please create an account first.";
        case "auth/wrong-password":
          return "Incorrect password.";
        case "auth/network-request-failed":
          return "Network error. Please check your internet connection.";
        case "auth/too-many-requests":
          return "Too many attempts. Please wait a moment and try again.";
        case "auth/configuration-not-found":
          return "Authentication is not enabled in Firebase yet. Please enable Email/Password in the Firebase console.";
        default:
          return error.message || "Something went wrong. Please try again.";
      }
    }

    soundToggle.addEventListener("click", async () => {
      if (soundEnabled) {
        turnSoundOff();
      } else {
        await turnSoundOn();
      }
    });

    bgVideo.addEventListener("error", () => {
      showMessage("Video could not load. Check the video filename and folder.");
    });

    updateSoundIcon();

    await setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, (user) => {
      if (authChecked) return;
      authChecked = true;

      if (user) {
        goToMap();
      }
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();

      if (!email || !password) {
        showMessage("Please enter email and password.");
        return;
      }

      setButtonsDisabled(true);

      try {
        showMessage("Logging in...");
        await signInWithEmailAndPassword(auth, email, password);
        showMessage("Login successful. Redirecting...");
        goToMap();
      } catch (error) {
        showMessage(getFriendlyErrorMessage(error));
      } finally {
        setButtonsDisabled(false);
      }
    });

    signupBtn.addEventListener("click", () => {
      window.open("https://docs.google.com/forms/d/e/1FAIpQLSeqV_CqW9RcIAzpD9GUXiq_5UcLbDRVVpxAfqKV5G7b0QwQ4g/viewform?usp=dialog", "_blank");
    });
  </script>
</body>
</html>
